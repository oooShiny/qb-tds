<!doctype html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QB TD Search</title>
    <link rel="icon" href="/icon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-icon.png">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        a { cursor: pointer; }
        th[data-col] { cursor: pointer; user-select: none; }
        th[data-col].sort-asc::after  { content: ' ↑'; }
        th[data-col].sort-desc::after { content: ' ↓'; }
    </style>
</head>
<body>

<div class="bg-gray-500 fixed p-2 shadow-lg text-white w-screen z-10">
    <ul class="flex flex-wrap justify-around">
                    <li class="hover:text-blue-300 hover:underline">
                <a href="tom-brady.html">Brady</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="philip-rivers.html">Rivers</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="peyton-manning.html">P. Manning</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="matt-stafford.html">Stafford</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="matt-ryan.html">Ryan</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="eli-manning.html">E. Manning</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="drew-brees.html">Brees</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="dan-marino.html">Marino</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="brett-favre.html">Favre</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="ben-roethlisberger.html">Roethlisberger</a>
            </li>
                    <li class="hover:text-blue-300 hover:underline">
                <a href="aaron-rodgers.html">Rodgers</a>
            </li>
            </ul>
</div>

<nav class="border-b-2 border-gray-200 p-4 mb-6 pt-16">
    <div class="container items-center justify-between lg:flex lg:flex-row md:flex-col mx-auto px-6 py-2">
        <div>
            <a class="text-4xl" href="/">QB TD Search</a>
        </div>
        <div id="qb-subnav" class="hidden">
            <ul class="inline-flex flex-wrap text-sm">
                <li><a id="nav-opponent" class="p-3 hover:bg-gray-500 hover:text-white" href="#">Opponent</a></li>
                <li><a id="nav-season"   class="p-3 hover:bg-gray-500 hover:text-white" href="#">Season</a></li>
                <li><a id="nav-week"     class="p-3 hover:bg-gray-500 hover:text-white" href="#">Week</a></li>
                <li><a id="nav-distance" class="p-3 hover:bg-gray-500 hover:text-white" href="#">Distance</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="px-10 pb-4 flex flex-wrap gap-2 items-baseline">
    Show all
    <select id="qb-select" class="border-b-2 border-black bg-transparent">
        <option value="">[all QBs]</option>
                    <option value="aaron-rodgers">Aaron Rodgers</option>
                    <option value="ben-roethlisberger">Ben Roethlisberger</option>
                    <option value="brett-favre">Brett Favre</option>
                    <option value="dan-marino">Dan Marino</option>
                    <option value="drew-brees">Drew Brees</option>
                    <option value="eli-manning">Eli Manning</option>
                    <option value="matt-ryan">Matt Ryan</option>
                    <option value="matt-stafford">Matt Stafford</option>
                    <option value="peyton-manning">Peyton Manning</option>
                    <option value="philip-rivers">Philip Rivers</option>
                    <option value="tom-brady">Tom Brady</option>
            </select>
    TDs thrown to
    <select id="player-select" class="border-b-2 border-black bg-transparent" disabled>
        <option value="">[any receiver]</option>
    </select>
    against the
    <select id="team-select" class="border-b-2 border-black bg-transparent" disabled>
        <option value="">[any team]</option>
    </select>
    from
    <select id="start-select" class="border-b-2 border-black bg-transparent" disabled>
        <option value="">[any season]</option>
    </select>
    to
    <select id="end-select" class="border-b-2 border-black bg-transparent" disabled>
        <option value="">[any season]</option>
    </select>
    <button id="reset-btn" class="ml-2 px-3 py-1 border border-gray-400 hover:bg-gray-500 hover:text-white text-sm">
        Reset
    </button>
</div>
<div id="result-count" class="bg-gray-500 mb-1.5 mx-auto py-1.5 text-2xl text-center text-white w-fit"></div>

<table class="mx-10 mb-10 table-auto w-11/12 text-sm">
    <thead class="text-left border-b-2 border-gray-300">
        <tr>
            <th class="pr-4 pb-2 text-gray-400 font-normal">#</th>
            <th class="pr-6 pb-2" data-col="qb_name">QB</th>
            <th class="pr-6 pb-2" data-col="season">Season</th>
            <th class="pr-6 pb-2" data-col="week">Wk</th>
            <th class="pr-6 pb-2" data-col="opponent">Opponent</th>
            <th class="pr-6 pb-2" data-col="yards_gained">Yds</th>
            <th class="pr-6 pb-2" data-col="players_involved">Receiver</th>
        </tr>
    </thead>
    <tbody id="results-body">
        <tr><td colspan="7" class="py-6 text-gray-400">Loading…</td></tr>
    </tbody>
</table>

<script>
const TEAM_MAP = {"ARI":"Cardinals","ATL":"Falcons","BAL":"Ravens","BUF":"Bills","CAR":"Panthers","CHI":"Bears","CIN":"Bengals","CLE":"Browns","DAL":"Cowboys","DEN":"Broncos","DET":"Lions","GNB":"Packers","HOU":"Texans","IND":"Colts","JAX":"Jaguars","KAN":"Chiefs","LAR":"Rams","LVR":"Raiders","LAC":"Chargers","MIA":"Dolphins","MIN":"Vikings","NOR":"Saints","NWE":"Patriots","NYG":"Giants","NYJ":"Jets","OAK":"Raiders","PHI":"Eagles","PHO":"Cardinals","PIT":"Steelers","RAI":"Raiders","RAM":"Rams","SDG":"Chargers","SEA":"Seahawks","SFO":"49ers","STL":"Rams","TAM":"Buccaneers","TEN":"Titans","WAS":"Commanders"};

let allTds  = [];
let sortCol = 'season';
let sortDir = -1; // -1 = desc, 1 = asc

const qbSel     = document.getElementById('qb-select');
const playerSel = document.getElementById('player-select');
const teamSel   = document.getElementById('team-select');
const startSel  = document.getElementById('start-select');
const endSel    = document.getElementById('end-select');
const resetBtn  = document.getElementById('reset-btn');
const tbody     = document.getElementById('results-body');
const countEl   = document.getElementById('result-count');
const subnav    = document.getElementById('qb-subnav');

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
    try {
        const res = await fetch('json/search.json');
        if (!res.ok) throw new Error(res.status);
        allTds = await res.json();
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-red-500">Failed to load search data.</td></tr>';
        return;
    }

    const initQB = new URLSearchParams(window.location.search).get('qb');
    if (initQB) qbSel.value = initQB;

    populateSecondaryFilters();
    filterAndRender();
}

// ── Filters ───────────────────────────────────────────────────────────────────

// Populate receiver, team, season dropdowns from the QB-filtered subset.
function populateSecondaryFilters() {
    const qb = qbSel.value;
    const subset = qb ? allTds.filter(td => td.qb === qb) : allTds;

    const playerCounts = {};
    const teams   = new Set();
    const seasons = new Set();

    subset.forEach(td => {
        playerCounts[td.players_involved] = (playerCounts[td.players_involved] || 0) + 1;
        teams.add(td.opponent);
        seasons.add(td.season);
    });

    const sortedPlayers = Object.entries(playerCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([p]) => [p, p]);

    const sortedTeams = [...teams]
        .sort((a, b) => (TEAM_MAP[a] || a).localeCompare(TEAM_MAP[b] || b))
        .map(t => [t, TEAM_MAP[t] || t]);

    const sortedSeasons = [...seasons].sort().map(s => [s, s]);

    rebuildOptions(playerSel, sortedPlayers);
    rebuildOptions(teamSel,   sortedTeams);
    rebuildOptions(startSel,  sortedSeasons);
    rebuildOptions(endSel,    sortedSeasons);

    [playerSel, teamSel, startSel, endSel].forEach(s => s.disabled = false);
}

function rebuildOptions(sel, pairs) {
    const prev = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    pairs.forEach(([val, label]) => sel.add(new Option(label, val)));
    if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}

// ── Filter & render ───────────────────────────────────────────────────────────

function filterAndRender() {
    const qb     = qbSel.value;
    const player = playerSel.value;
    const team   = teamSel.value;
    const start  = startSel.value;
    const end    = endSel.value;

    let rows = allTds.filter(td => {
        if (qb     && td.qb               !== qb)     return false;
        if (player && td.players_involved  !== player) return false;
        if (team   && td.opponent          !== team)   return false;
        if (start  && td.season             < start)   return false;
        if (end    && td.season             > end)     return false;
        return true;
    });

    rows.sort((a, b) => {
        let av = a[sortCol], bv = b[sortCol];
        if (!isNaN(av) && !isNaN(bv)) { av = +av; bv = +bv; }
        if (av < bv) return -sortDir;
        if (av > bv) return  sortDir;
        return (+b.season - +a.season) || (+b.week - +a.week);
    });

    countEl.textContent = rows.length.toLocaleString() + ' TD' + (rows.length !== 1 ? 's' : '');

    // Subnav: only show chart links when a single QB is selected
    if (qb) {
        subnav.classList.remove('hidden');
        document.getElementById('nav-opponent').href  = qb + '.html#opponent';
        document.getElementById('nav-season').href    = qb + '.html#season';
        document.getElementById('nav-week').href      = qb + '.html#week';
        document.getElementById('nav-distance').href  = qb + '.html#distance';
    } else {
        subnav.classList.add('hidden');
    }

    if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-gray-400">No results.</td></tr>';
        return;
    }

    tbody.innerHTML = rows.map((td, i) => `
        <tr class="${i % 2 ? 'bg-gray-50' : ''}">
            <td class="pr-4 py-1 text-gray-400">${i + 1}</td>
            <td class="pr-6 py-1">${td.qb_name}</td>
            <td class="pr-6 py-1">${td.season}</td>
            <td class="pr-6 py-1">${td.week}</td>
            <td class="pr-6 py-1">${TEAM_MAP[td.opponent] || td.opponent}</td>
            <td class="pr-6 py-1">${td.yards_gained}</td>
            <td class="pr-6 py-1">${td.players_involved}</td>
        </tr>
    `).join('');
}

// ── Sortable headers ──────────────────────────────────────────────────────────

document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
        const col = th.dataset.col;
        sortDir = (sortCol === col) ? -sortDir : 1;
        sortCol = col;
        document.querySelectorAll('th[data-col]').forEach(h =>
            h.classList.remove('sort-asc', 'sort-desc')
        );
        th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
        filterAndRender();
    });
});

// ── Events ────────────────────────────────────────────────────────────────────

qbSel.addEventListener('change', () => {
    const slug = qbSel.value;
    history.replaceState(null, '', slug ? '?qb=' + slug : window.location.pathname);
    // Reset secondary filters and repopulate for the new QB scope
    [playerSel, teamSel, startSel, endSel].forEach(s => s.value = '');
    populateSecondaryFilters();
    filterAndRender();
});

[playerSel, teamSel, startSel, endSel].forEach(sel =>
    sel.addEventListener('change', filterAndRender)
);

resetBtn.addEventListener('click', () => {
    qbSel.value = '';
    [playerSel, teamSel, startSel, endSel].forEach(s => s.value = '');
    history.replaceState(null, '', window.location.pathname);
    populateSecondaryFilters();
    filterAndRender();
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
